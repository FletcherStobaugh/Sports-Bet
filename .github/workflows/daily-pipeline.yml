name: Daily Pipeline

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  analyze-and-bet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Analyze props and auto-bet on Kalshi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: npx tsx scripts/run-pipeline.ts all
