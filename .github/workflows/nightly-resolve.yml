name: Nightly Resolve

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  resolve-bets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Resolve pending bets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/run-pipeline.ts resolve
