name: Trading Bot

on:
  schedule:
    # Arb scanner runs every hour (arbs appear and close fast)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Bot mode: scan or trade"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - trade
      bot:
        description: "Which bot to run"
        required: true
        default: "arb"
        type: choice
        options:
          - arb
          - btc
          - weather
          - all

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run Arb Scanner
        if: ${{ github.event.inputs.bot == 'arb' || github.event.inputs.bot == 'all' || github.event.inputs.bot == '' }}
        env:
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: npx tsx scripts/run-arb-scanner.ts ${{ github.event.inputs.mode || 'scan' }}
      - name: Run BTC bot
        if: ${{ github.event.inputs.bot == 'btc' || github.event.inputs.bot == 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: npx tsx scripts/run-btc-bot.ts ${{ github.event.inputs.mode || 'scan' }}
      - name: Run Weather bot
        if: ${{ github.event.inputs.bot == 'weather' || github.event.inputs.bot == 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: npx tsx scripts/run-weather-bot.ts ${{ github.event.inputs.mode || 'scan' }}
